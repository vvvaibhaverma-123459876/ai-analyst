[pytest]
# ── Discovery ────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ───────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# ── Markers ──────────────────────────────────────────────
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    llm: marks tests that require a live LLM API key
    connector: marks tests that require a live database connection
    unit: fast isolated unit tests
    integration: tests that run the full pipeline

# ── Coverage (used when --cov is passed) ─────────────────
# Run with: pytest --cov=. --cov-report=xml --cov-report=term-missing

# ── Timeouts ─────────────────────────────────────────────
# CI runs the full suite directly; long-running optional tests are gated by env vars.
