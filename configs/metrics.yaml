# configs/metrics.yaml
# Governed business metrics used by semantic registry + SQL generation.

metrics:
  signups:
    label: "Signups"
    description: "Total number of new user registrations"
    column: "signups"
    aggregation: "sum"
    aliases: ["new users", "registrations", "new signups"]
    dimensions: ["date", "platform", "source", "campaign", "bank"]
    allowed_grains: ["hourly", "daily", "weekly", "monthly"]
    owner: "growth_analytics"
    maturity: "production"
    source_tables: ["user_funnel_daily"]

  revenue:
    label: "Revenue"
    description: "Total transaction revenue in INR"
    column: "revenue"
    aggregation: "sum"
    aliases: ["total revenue", "earnings", "gmv"]
    dimensions: ["date", "source", "campaign", "product"]
    allowed_grains: ["daily", "weekly", "monthly"]
    owner: "finance_analytics"
    maturity: "production"
    source_tables: ["transactions_daily"]
    caveats: ["Refunded transactions should be excluded from net revenue views."]

  conversion_rate:
    label: "Conversion Rate"
    description: "Signups who completed a target action / total signups"
    numerator: "converted_users"
    denominator: "signups"
    aggregation: "ratio"
    aliases: ["cvr", "conversion", "success rate"]
    dimensions: ["date", "platform", "source", "campaign"]
    allowed_grains: ["daily", "weekly", "monthly"]
    owner: "growth_analytics"
    maturity: "production"
    eligible_population: "All valid signups excluding test and internal traffic"
    exclusions: ["internal users", "test traffic"]
    source_tables: ["user_funnel_daily"]

  fd_payment_conversion:
    label: "FD Payment Conversion"
    description: "Users who completed FD payment / users who initiated FD"
    numerator: "fd_payment_success"
    denominator: "fd_payment_initiated"
    aggregation: "ratio"
    aliases: ["fd conversion", "fixed deposit conversion", "fd success rate"]
    dimensions: ["date", "bank", "platform", "source", "campaign"]
    allowed_grains: ["hourly", "daily", "weekly"]
    owner: "secured_cards_growth"
    maturity: "production"
    eligible_population: "Users who initiated FD payment"
    exclusions: ["employee accounts", "internal QA traffic"]
    source_tables: ["fd_funnel_hourly", "fd_funnel_daily"]
    caveats: ["Compare same weekday baseline for DoD investigations."]

  kyc_completion:
    label: "KYC Completion Rate"
    description: "Users who completed KYC / users who started KYC"
    numerator: "kyc_completed"
    denominator: "kyc_started"
    aggregation: "ratio"
    aliases: ["kyc rate", "kyc success"]
    dimensions: ["date", "bank", "platform", "source"]
    allowed_grains: ["daily", "weekly"]
    owner: "ops_analytics"
    maturity: "production"
    eligible_population: "Users who started KYC"
    source_tables: ["kyc_funnel_daily"]
