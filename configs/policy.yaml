min_sample_size: 30
min_ab_group_size: 100
max_pvalue_threshold: 0.05
require_confidence_intervals: true
no_causal_claims_without_dag: true
min_forecast_data_points: 14
min_cluster_silhouette: 0.25
max_anomaly_false_positive_rate: 0.2
max_confidence_without_holdout: 0.7
max_external_data_classification: PUBLIC
internet_off_mode: false
local_llm_mode: false
local_llm_model: mistral
local_llm_base_url: http://localhost:11434
allow_raw_data_in_prompts: false
require_debate_jury: true
permitted_agents:
- eda
- orchestrator
- trend
- anomaly
- root_cause
- funnel
- cohort
- forecast
- experiment
- ml_cluster
- nlp
- vision
- debate
- insight
require_reproducible_manifest: true
block_strong_conclusions_below_quality_score: 0.45
require_human_approval_for_governed_truth_changes: true
allow_auto_promote_learned_truth: false
