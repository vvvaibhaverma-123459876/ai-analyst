services:
  ui:
    build: .
    command: streamlit run app/ui/product_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env.ci
    volumes:
      - ./memory:/app/memory
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env.ci
    volumes:
      - ./memory:/app/memory
